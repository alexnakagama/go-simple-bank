services:
    app:
        build: .
        ports:
            - "8080:8080"
        env_file:
            - app.env
        depends_on:
            db:
                condition: service_healthy
        networks:
            - backend

    db:
        image: postgres:15
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: root
        ports:
            - "5432:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U root"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - backend

networks:
    backend:

volumes:
    db_data:
